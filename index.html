<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Content Pipeline — Shubham Khanal</title>
<meta name="description" content="Live demo: an end-to-end AI content automation pipeline built with n8n, Google Gemini and the WordPress REST API by Shubham Khanal." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
  :root{
    --bg:#0a0a0a;
    --panel:#111;
    --line:#222;
    --text:#e8e8e8;
    --muted:#666;
    --amber:#f0a32a;
    --amber-dim:#7a5413;
    --green:#3db556;
    --paper:#faf9f7;
    --paper-ink:#1a1a18;
    --radius:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
  a{color:var(--muted);text-decoration:none}
  a:hover{color:var(--text)}
  button:focus-visible,input:focus-visible{outline:2px solid var(--amber);outline-offset:2px}
  .wrap{max-width:680px;margin:0 auto;padding:0 20px;width:100%}

  /* header */
  header{padding:20px 0;border-bottom:1px solid var(--line)}
  header .wrap{display:flex;justify-content:space-between;align-items:center}
  .brand{font-size:.9rem;font-weight:600;color:var(--text)}
  nav{display:flex;gap:20px;font-size:.82rem}

  /* main */
  main{flex:1;padding:48px 0 64px}

  /* input */
  .input-row{display:flex;gap:8px}
  .input-row input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);color:var(--text);font:inherit;font-size:.95rem;padding:12px 14px}
  .input-row input::placeholder{color:var(--muted)}
  .input-row button{background:var(--amber);color:#1a0e00;border:none;border-radius:var(--radius);font:inherit;font-size:.9rem;font-weight:600;padding:12px 22px;cursor:pointer;white-space:nowrap;transition:filter .15s}
  .input-row button:hover{filter:brightness(1.1)}
  .input-row button:disabled{background:var(--amber-dim);color:#3c2f15;cursor:wait}

  /* pipeline */
  .pipeline{display:flex;align-items:flex-start;margin:32px 0 0;user-select:none}
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center}
  .node{width:40px;height:40px;border-radius:8px;background:var(--panel);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:border-color .3s,box-shadow .3s,background .3s}
  .stage .label{margin-top:7px;font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}
  .edge{flex:1;height:1px;background:var(--line);margin-top:20px;position:relative;overflow:hidden;min-width:12px}
  .edge::after{content:'';position:absolute;inset:0;background:var(--green);transform:scaleX(0);transform-origin:left;transition:transform .5s ease}
  .edge.done::after{transform:scaleX(1)}
  .stage.active .node{border-color:var(--amber);box-shadow:0 0 0 3px rgba(240,163,42,.12);animation:pulse 1.4s ease-in-out infinite}
  .stage.done .node{border-color:var(--green);background:#0d1f11}
  .stage.done .label{color:var(--green)}
  .stage.prod-only{opacity:.35}
  .stage.prod-only .label::after{content:'prod';margin-left:4px;font-size:.5rem;background:var(--panel);border:1px solid var(--line);border-radius:2px;padding:1px 3px;color:var(--muted)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(240,163,42,.08)}50%{box-shadow:0 0 0 6px rgba(240,163,42,.18)}}
  @media(prefers-reduced-motion:reduce){.stage.active .node{animation:none}.edge::after{transition:none}}

  /* status */
  .status{margin-top:16px;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--muted);min-height:1.2em}
  .status.err{color:#e5534b}

  /* seo badge */
  .seo-badge{display:none;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:.68rem;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--green)}

  /* article */
  .article{display:none;margin-top:28px;background:var(--paper);color:var(--paper-ink);border-radius:var(--radius);padding:32px clamp(16px,5vw,44px);font-family:Georgia,'Times New Roman',serif;line-height:1.8}
  .article.show{display:block;animation:rise .4s ease}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .article h1,.article h2,.article h3{font-family:'Inter',sans-serif;line-height:1.25;margin:1.4em 0 .4em;color:#111}
  .article h1{font-size:1.55rem;margin-top:0}
  .article h2{font-size:1.15rem}
  .article p{margin:.8em 0}
  .article ul,.article ol{margin:.8em 0 .8em 1.4em}
  .article-meta{font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;color:#999;border-bottom:1px solid #e8e3d8;padding-bottom:10px;margin-bottom:18px}

  /* footer */
  footer{padding:20px 0;border-top:1px solid var(--line)}
  footer .wrap{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:.8rem;color:var(--muted)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="brand">Shubham Khanal</div>
    <nav>
      <a href="https://github.com/KhanalShubham" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.linkedin.com/in/shubhamkhanal/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://shubhamkhanal.wordpress.com" target="_blank" rel="noopener">Blog</a>
    </nav>
  </div>
</header>
<main>
  <div class="wrap">
    <div class="input-row">
      <input id="topic" type="text" maxlength="120" placeholder="Enter a topic and watch the pipeline run…" aria-label="Article topic" />
      <button id="go">Generate</button>
    </div>
    <div class="pipeline" aria-hidden="true">
      <div class="stage" id="s0"><div class="node">📥</div><div class="label">Webhook</div></div>
      <div class="edge" id="e0"></div>
      <div class="stage" id="s1"><div class="node">✍️</div><div class="label">Gemini</div></div>
      <div class="edge" id="e1"></div>
      <div class="stage" id="s2"><div class="node">📈</div><div class="label">SEO</div></div>
      <div class="edge" id="e2"></div>
      <div class="stage prod-only" id="s3"><div class="node">📧</div><div class="label">Email gate</div></div>
      <div class="edge" id="e3"></div>
      <div class="stage prod-only" id="s4"><div class="node">✅</div><div class="label">Approve</div></div>
      <div class="edge" id="e4"></div>
      <div class="stage prod-only" id="s5"><div class="node">🌐</div><div class="label">WordPress</div></div>
    </div>
    <div class="seo-badge" id="seo-badge"></div>
    <div class="status" id="status" role="status"></div>
    <article class="article" id="article">
      <div class="article-meta" id="article-meta"></div>
      <div id="article-body"></div>
    </article>
  </div>
</main>
<footer>
  <div class="wrap">
    <span>Shubham Khanal · Kathmandu, Nepal</span>
    <span>n8n · Gemini · WordPress REST API</span>
  </div>
</footer>
<script>
const WEBHOOK_URL = "https://shubhamkhanal593.app.n8n.cloud/webhook/generate-article";
const $ = id => document.getElementById(id);
const stages = [$('s0'),$('s1'),$('s2'),$('s3'),$('s4'),$('s5')];
const edges  = [$('e0'),$('e1'),$('e2'),$('e3'),$('e4')];
let timers = [];
function resetPipeline(){
  timers.forEach(clearTimeout); timers = [];
  stages.forEach(s => s.classList.remove('active','done'));
  edges.forEach(e => e.classList.remove('done'));
  $('article').classList.remove('show');
  $('status').classList.remove('err');
  $('seo-badge').style.display = 'none';
}
function setStage(i){
  stages.forEach((s,idx)=>{
    s.classList.toggle('done', idx < i);
    s.classList.toggle('active', idx === i);
  });
  edges.forEach((e,idx)=> e.classList.toggle('done', idx < i));
}
function finishThrough(i){
  for(let idx=0;idx<=i;idx++){
    stages[idx].classList.remove('active');
    stages[idx].classList.add('done');
  }
  for(let idx=0;idx<i;idx++) edges[idx].classList.add('done');
}
function status(msg, isErr=false){
  $('status').textContent = msg;
  $('status').classList.toggle('err', isErr);
}
async function generate(){
  const topic = $('topic').value.trim();
  if(!topic){ $('topic').focus(); return; }
  const btn = $('go');
  btn.disabled = true; btn.textContent = 'Running…';
  resetPipeline();
  setStage(0);
  status('Pipeline started…');
  timers.push(setTimeout(()=>{ status('Waking up…'); }, 8000));
  timers.push(setTimeout(()=>{ setStage(1); status('Gemini writing…'); }, 18000));
  timers.push(setTimeout(()=>{ setStage(2); status('SEO scoring…'); }, 45000));
  timers.push(setTimeout(()=>{ status('Still working…'); }, 70000));
  const controller = new AbortController();
  const kill = setTimeout(()=>controller.abort(), 150000);
  try{
    const res = await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic}),signal:controller.signal});
    clearTimeout(kill); timers.forEach(clearTimeout);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const md = data.article || data.output || (typeof data==='string'?data:null);
    if(!md) throw new Error('Empty response');
    finishThrough(2);
    if(data.seoScore){
      const b = $('seo-badge');
      b.textContent = 'SEO score: '+data.seoScore+'/100';
      b.style.display = 'inline-block';
    }
    status('Done — in production this continues to email approval → WordPress.');
    $('article-meta').textContent = 'draft · '+new Date().toLocaleTimeString()+' · '+topic+(data.wordCount?' · '+data.wordCount+' words':'');
    $('article-body').innerHTML = marked.parse(md);
    $('article').classList.add('show');
    $('article').scrollIntoView({behavior:'smooth',block:'start'});
  }catch(err){
    timers.forEach(clearTimeout);
    stages.forEach(s=>s.classList.remove('active'));
    const aborted = err.name==='AbortError';
    status(aborted?'Timed out — try again, second runs are instant.':'Could not reach the pipeline. Try again.',true);
  }finally{
    btn.disabled=false; btn.textContent='Generate';
  }
}
$('go').addEventListener('click',generate);
$('topic').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});
</script>
</body>
</html>
